services:
  - type: web
    name: teletext-scores
    env: node
    plan: starter
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: FPL_LEAGUE_ID
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: teletext-scores-db
          property: connectionString

databases:
  - name: teletext-scores-db
    plan: basic-256mb
    databaseName: teletext_scores_2
