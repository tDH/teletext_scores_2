<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceefax Draft League</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="ceefax-container">
        <button class="ceefax-back-button" onclick="window.location.href='index.html'">BACK</button>

        <div class="ceefax-header">
            <span>CEEFAX</span>
            <span class="ceefax-page-number">P306</span>
            <span id="ceefax-time">14:30:45</span>
        </div>

        <h1 class="ceefax-title" id="draft-title">FPL DRAFT LEAGUE</h1>

        <div class="ceefax-content">
            <div class="ceefax-category">
                <div class="ceefax-draft-content">
                    <div class="ceefax-loading">LOADING LEAGUE DATA...</div>
                </div>
            </div>

            <div class="ceefax-chart-container">
                <canvas id="positionChart"></canvas>
            </div>
        </div>

        <div class="ceefax-footer">
            <div class="ceefax-navigation">
                <span class="ceefax-nav-item">INDEX P301</span>
                <span class="ceefax-nav-item">SCORES P302</span>
            </div>
            <div class="ceefax-update">LAST UPDATED: --:--</div>
        </div>
    </div>

    <script src="draft-league.js"></script>
</body>
</html>
