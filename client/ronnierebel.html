<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RonnieRebel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ceefax-container">
        <div class="ceefax-header">
            <div class="ceefax-page-number">P504</div>
            <div id="ceefax-time">00:00:00</div>
        </div>

        <h1 class="ceefax-tamboozle-title">RONNIEREBEL</h1>

        <div class="ceefax-content">

            <!-- ── Setup screen ─────────────────────────────────────────── -->
            <div id="rr-setup-screen" class="ceefax-quiz-screen">
                <div class="ronnierebel-setup-wrapper">

                    <!-- Image + quote side by side -->
                    <div class="ronnierebel-hero">
                        <div class="ronnierebel-face-wrap">
                            <img src="utils/img/ronnierebel.png" alt="Ronnie Rebel" class="ronnierebel-face-img">
                        </div>
                        <div class="ronnierebel-quote">
                            "think you can out rebel me ya cunt?"
                        </div>
                    </div>

                    <!-- Form — initials only -->
                    <div class="tamboozle-setup-form">
                        <div class="ceefax-quiz-field">
                            <label class="ceefax-quiz-label">INITIALS</label>
                            <input id="rr-name" type="text" class="ceefax-quiz-input"
                                   maxlength="3" placeholder="ABC" autocomplete="off">
                        </div>
                        <button id="rr-start-btn" class="ceefax-quiz-start-btn">START &#9654;</button>
                        <div id="rr-setup-error" class="ceefax-quiz-error" style="display:none;"></div>
                    </div>

                </div>
            </div>

            <!-- ── Loading screen ─────────────────────────────────────────── -->
            <div id="rr-loading-screen" class="ceefax-quiz-screen" style="display:none;">
                <div class="ceefax-loading">RONNIEREBEL IS THINKING...</div>
            </div>

            <!-- ── Quiz screen ───────────────────────────────────────────── -->
            <div id="rr-quiz-screen" class="ceefax-quiz-screen" style="display:none;">
                <div class="ceefax-quiz-meta">
                    <span id="rr-question-counter" class="ceefax-quiz-counter">Q1 OF 5</span>
                    <span id="rr-timer-display" class="ceefax-quiz-timer-display">30s</span>
                </div>
                <div class="ceefax-quiz-timer-bar">
                    <div id="rr-timer-fill" class="ceefax-quiz-timer-fill"></div>
                </div>
                <div id="rr-question-text" class="ceefax-quiz-question"></div>

                <div class="tamboozle-press-box">PRESS THE COLOUR OF YOUR CHOICE</div>
                <div class="tamboozle-answer-divider"></div>
                <div id="rr-options" class="ceefax-quiz-options"></div>
                <div class="tamboozle-answer-divider"></div>
            </div>

            <!-- ── Results screen ────────────────────────────────────────── -->
            <div id="rr-results-screen" class="ceefax-quiz-screen" style="display:none;">
                <div class="ceefax-quiz-results-summary">
                    <div class="ceefax-quiz-score-line">
                        <span id="rr-results-score" class="ceefax-quiz-final-score"></span>
                        <span id="rr-results-time" class="ceefax-quiz-final-time"></span>
                    </div>
                </div>
                <div class="ceefax-quiz-leaderboard-title">RONNIEREBEL LEADERBOARD</div>
                <div id="rr-leaderboard-container"></div>
                <button id="rr-again-btn" class="ceefax-quiz-start-btn" style="margin-top:1em;">PLAY AGAIN &#9654;</button>
            </div>

        </div>

        <div class="ceefax-footer">
            <div class="ceefax-navigation">
                <span class="ceefax-nav-item"><a href="index.html" style="color:inherit;text-decoration:none;">HOME P301</a></span>
            </div>
            <div class="ceefax-update">UPDATED: 00:00</div>
        </div>
    </div>

    <button onclick="window.location.href='index.html'" class="ceefax-back-button">&#9664; BACK</button>

    <script src="config.js"></script>
    <script src="ronnierebel.js"></script>
</body>
</html>
