<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceefax FPL Draft Matchup</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button onclick="window.location.href='fixtureslist.html'" class="ceefax-back-button">BACK</button>

    <div class="ceefax-container">
        <div class="ceefax-header">
            <div class="ceefax-page-number">P308</div>
            <div id="ceefax-time">00:00:00</div>
        </div>

        <!-- Score line: e.g. "AMORIM SHOTTS FC 47 V 38 CLIPPER FC" -->
        <div id="matchup-score-line" class="ceefax-matchup-score-line">
            LOADING...
        </div>
        <div id="matchup-gw" class="ceefax-matchup-gw">GAMEWEEK 0</div>

        <!-- Two-column team layout -->
        <div class="ceefax-fixture-content">
            <!-- Home team column -->
            <div class="ceefax-team-section">
                <div id="home-col-header" class="ceefax-matchup-col-header">HOME TEAM</div>
                <div id="home-team-players">
                    <div class="ceefax-loading">LOADING...</div>
                </div>
            </div>

            <!-- Away team column -->
            <div class="ceefax-team-section">
                <div id="away-col-header" class="ceefax-matchup-col-header">AWAY TEAM</div>
                <div id="away-team-players">
                    <div class="ceefax-loading">LOADING...</div>
                </div>
            </div>
        </div>

        <div class="ceefax-footer">
            <div class="ceefax-navigation">
                <span class="ceefax-nav-item"><a href="fixtureslist.html" style="color: inherit; text-decoration: none;">FIXTURES P306</a></span>
                <span class="ceefax-nav-item"><a href="fpl.html" style="color: inherit; text-decoration: none;">STANDINGS P305</a></span>
                <span class="ceefax-nav-item"><a href="index.html" style="color: inherit; text-decoration: none;">HOME P100</a></span>
            </div>
            <div class="ceefax-update">UPDATED: 00:00</div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="matchup.js"></script>
</body>
</html>
